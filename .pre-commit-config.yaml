repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        files: ^(cinesort|tests|scripts)/.*\.py$
      - id: end-of-file-fixer
        files: ^(cinesort|tests|scripts)/.*\.py$
      - id: check-yaml
      - id: check-toml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff
        name: ruff check
        args: [--config=pyproject.toml]
        files: ^(cinesort|tests|scripts)/.*\.py$
      - id: ruff-format
        name: ruff format
        args: [--config=pyproject.toml]
        files: ^(cinesort|tests|scripts)/.*\.py$
