<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineSort</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
    color: #f0f0f5;
    display: flex; align-items: center; justify-content: center;
    user-select: none; -webkit-user-select: none;
  }
  .splash {
    text-align: center;
    width: 100%; max-width: 440px; padding: 0 20px;
  }
  .logo {
    font-size: 2.5rem; font-weight: 700; letter-spacing: -0.5px;
    text-shadow: 0 0 24px rgba(96, 165, 250, 0.3);
    margin-bottom: 6px;
  }
  .logo .accent { color: #60a5fa; }
  .subtitle {
    font-size: 0.85rem; color: #888; margin-bottom: 28px;
  }
  .bar-track {
    width: 80%; margin: 0 auto 16px;
    height: 5px; border-radius: 4px;
    background: rgba(255,255,255,0.06);
    overflow: hidden;
  }
  .bar-fill {
    height: 100%; width: 0%; border-radius: 4px;
    background: linear-gradient(90deg, #3b82f6, #60a5fa);
    transition: width 0.4s ease;
  }
  .step-text {
    font-size: 0.82rem; color: #aaa;
    min-height: 1.2em;
    transition: opacity 0.25s;
  }
  .version {
    position: fixed; bottom: 8px; right: 12px;
    font-size: 0.7rem; color: #444;
  }
</style>
</head>
<body>
<div class="splash">
  <div class="logo">Cine<span class="accent">Sort</span></div>
  <div class="subtitle">Gestionnaire de bibliotheque cinema</div>
  <div class="bar-track"><div class="bar-fill" id="bar"></div></div>
  <div class="step-text" id="stepText">Initialisation...</div>
</div>
<div class="version" id="ver"></div>
<script>
  // Expose une fonction globale appelee depuis Python via evaluate_js
  function updateProgress(step, text, percent) {
    var bar = document.getElementById("bar");
    var stepEl = document.getElementById("stepText");
    if (bar) bar.style.width = Math.min(100, Math.max(0, percent)) + "%";
    if (stepEl) {
      stepEl.style.opacity = "0";
      setTimeout(function() {
        stepEl.textContent = text;
        stepEl.style.opacity = "1";
      }, 120);
    }
  }
  function setVersion(v) {
    var el = document.getElementById("ver");
    if (el) el.textContent = v;
  }
</script>
</body>
</html>
