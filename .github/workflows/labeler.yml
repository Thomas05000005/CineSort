name: Auto-label PRs

# Label automatique des PRs selon les fichiers touches.
# Config dans .github/labeler.yml.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  label:
    name: Apply labels
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      pull-requests: write  # scope au job qui en a besoin

    steps:
      - uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9 # v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true  # retire les labels qui ne s'appliquent plus
