name: Release Drafter

# Tient un draft de la prochaine release a jour automatiquement.
# Chaque PR mergee sur main ajoute son titre aux release notes du draft.
# Quand vous tagger une release, les notes sont deja pretes.

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  update_release_draft:
    name: Update release draft
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write  # cree/edite le draft de release
      pull-requests: read

    steps:
      - uses: release-drafter/release-drafter@6a93d829887aa2e0748befe2e808c66c0ec6e4c7 # v6
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
