name: Claude Code

# Lance Claude Code (Anthropic) sur le repo via GitHub Actions.
#
# Modes :
# 1. Mention @claude dans une issue/PR comment -> Claude execute la tache
# 2. Schedule hebdomadaire -> audit complet du repo + ouverture PRs si besoin
# 3. workflow_dispatch -> lancement manuel
#
# Authentification : utilise l'OAuth token de l'abonnement Claude.ai Max.
# Token a generer via : claude setup-token (en local)
# A coller dans GitHub Secrets sous le nom CLAUDE_CODE_OAUTH_TOKEN.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]
  pull_request:
    types: [opened, ready_for_review]
  schedule:
    # Lundi 04h UTC : audit hebdomadaire automatique
    # Coute ~5-10 prompts (audit complet ~50k LOC).
    - cron: "0 4 * * 1"
  workflow_dispatch:
    inputs:
      prompt:
        description: "Mission pour Claude (laisser vide = audit complet)"
        required: false
        default: "Fais un audit complet du repo CineSort : verifie qu'il n'y a pas de bugs latents, de regressions de qualite, de patterns dangereux. Si tu trouves des problemes corrigeables, ouvre des PRs avec les fixes. Reponds en francais."

# Best practice OpenSSF Scorecard : top-level permissions = read-only.
# Les writes (contents/pull-requests/issues) sont scopes au job ci-dessous
# qui en a besoin.
permissions:
  contents: read

jobs:
  claude:
    name: Claude Code session
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # Permissions scopees ici : ce job a besoin de creer issues/PRs
    # et pousser sur branches non-protegees. main reste protegee par
    # branch protection rules (PR + 7 status checks).
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    # Ne lance que si la mention contient @claude OU si c'est un schedule/dispatch
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude'))) ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.body, '@claude'))

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Run Claude Code
        uses: anthropics/claude-code-action@dde2242db6af13460b916652159b6ba19a598f30 # v1
        with:
          # OAuth token de l'abonnement Max (cf instructions setup au-dessus)
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Opus 4.7 via --model dans claude_args (l'input 'model' au niveau
          # racine n'existe pas dans claude-code-action@v1).
          # max-turns 200 + timeout 90min pour les sessions @claude longues
          # (mention sur PR avec demande d'analyse + fix + tests).
          # --allowedTools en camelCase + format "Tool1,Tool2,Bash(cmd:*)".
          # Branch protection main reste active : Claude doit toujours
          # passer par une PR, pas de push direct sur main.
          claude_args: |
            --model claude-opus-4-7
            --max-turns 200
            --allowedTools "Edit,Write,Read,Glob,Grep,WebFetch,Bash(gh issue create:*),Bash(gh issue comment:*),Bash(gh issue edit:*),Bash(gh issue list:*),Bash(gh issue view:*),Bash(gh pr create:*),Bash(gh pr comment:*),Bash(gh pr edit:*),Bash(gh pr list:*),Bash(gh pr view:*),Bash(gh label create:*),Bash(gh label list:*),Bash(gh search:*),Bash(git push:*),Bash(git checkout:*),Bash(git commit:*),Bash(git add:*),Bash(git branch:*),Bash(git tag:*),Bash(git merge:*),Bash(git rebase:*),Bash(git diff:*),Bash(git log:*),Bash(git status:*),Bash(find:*),Bash(grep:*),Bash(rg:*),Bash(wc:*),Bash(sort:*),Bash(uniq:*),Bash(head:*),Bash(tail:*),Bash(cat:*),Bash(python -m:*)"
          # Prompt par defaut sur schedule/dispatch ; ignore en mode mention
          # (mention contient deja le prompt). Bloc YAML > pour eviter les
          # problemes d'echappement avec les expressions GitHub ${{ }}.
          prompt: >-
            ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.prompt
            || (github.event_name == 'schedule' && 'Audit hebdomadaire CineSort avec Opus 4.7 + thinking max.

            CONTEXTE PROJET (mai 2026) :
            - Architecture en couches verrouillee par import-linter en CI (.importlinter, 3 contracts).
            - Cycle domain->app BRISE en mai 2026 (issue #83 closed). NE PAS REINTRODUIRE.
            - Repository pattern installe sur SQLiteStore (store.probe, store.scan, store.quality, etc.).
            - Facade pattern sur CineSortApi (api.run, api.settings, api.quality, api.integrations, api.library).
            - Tests : 4277 unitaires, coverage seuil 80%.

            Verifie systematiquement les 17 categories :
            (1) bugs latents Python (None deref, race conditions, mutable defaults),
            (2) bugs domaine metier,
            (3) performance (O(n^2), I/O loop, N+1, DOM reflow),
            (4) securite (subprocess shell, SQL injection, secrets clear, XSS, path traversal),
            (5) concurrence (race, lock, thread safety),
            (6) UI/frontend (XSS innerHTML, memory leak listeners, fetch sans catch),
            (7) accessibilite a11y (WCAG 2.2 AA),
            (8) i18n strings hardcodes,
            (9) migrations DB (idempotence ALTER TABLE, foreign keys, integrity),
            (10) dette technique (fonctions >100L, magic numbers, duplications, NOUVEAUX lazy imports a justifier),
            (11) code mort (fonctions/imports/vars jamais utilises),
            (12) patterns Python non-idiomatiques,
            (13) typing (mypy errors, Optional implicites),
            (14) error handling (silenced, missing chain, trop large),
            (15) logging (secrets en clair, niveau errone, scrubber bypassed),
            (16) tests (mock excessif, sans assertion, flakes),
            (17) ARCHITECTURE INVARIANTS :
                * Aucun import domain->app/infra/ui (verifie via `lint-imports`)
                * Aucun import infra->app/ui
                * Aucun import app->ui
                * Nouveau code SQL doit utiliser Repository pattern, pas un mixin
                * Nouvelle methode publique doit etre sur une facade, pas directement sur CineSortApi
                * Modules avec classes mockees en test doivent utiliser pattern module-style.

            Avant action : `gh issue list --state open` et `gh pr list --state open` pour dedup.
            EXECUTE les actions (gh issue create / gh pr create / git push), ne les decris pas.
            Reponds en francais.')
            || '' }}
