name: OpenSSF Scorecard

# Note de securite publique pour le repo (0-10).
# Verifie 18 controles : signed commits, branch protection, deps pinning,
# CI/CD security, vulnerability scanning, license, etc.
#
# Le badge "OpenSSF Scorecard X/10" peut etre ajoute au README pour montrer
# la maturite securite du projet aux contributeurs/utilisateurs.

on:
  push:
    branches: [main]
  schedule:
    # Lundi 06h00 UTC : recalcule la note hebdomadaire
    - cron: "0 6 * * 1"
  workflow_dispatch:

# Scorecard exige permissions: read-all au niveau workflow + permissions
# specifiques au niveau job. Avoir security-events: write globalement
# declenche un fail "workflow verification failed: global perm is set to
# write".
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          # publish_results: true permet a OpenSSF de publier le score
          # sur le dashboard public scorecard.dev. Active : signal de
          # transparence, montre la maturite du projet.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: scorecard-results
          path: scorecard-results.sarif
          retention-days: 7

      - name: Upload to GitHub Security tab
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
        with:
          sarif_file: scorecard-results.sarif
          category: scorecard
