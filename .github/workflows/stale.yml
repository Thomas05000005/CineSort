name: Mark stale issues and PRs

# Ferme automatiquement les issues/PRs sans activite depuis longtemps.
# Configuration tolerante pour la beta : un gros delai d'inactivite avant de
# tagger "stale", et delai supplementaire avant de fermer.

on:
  schedule:
    # Lundi 08h UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Stale check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/stale@v9
        with:
          # ===== Issues =====
          days-before-issue-stale: 60  # 2 mois d'inactivite -> tag stale
          days-before-issue-close: 14  # 2 semaines apres tag stale -> close
          stale-issue-label: "stale"
          stale-issue-message: |
            👋 Cette issue n'a pas eu d'activite depuis 60 jours.

            Elle sera fermee dans 14 jours sans nouveau commentaire.

            **Pour la garder ouverte** : ajoutez un commentaire ou retirez
            le label `stale`. Les issues avec le label `pinned`, `bug`,
            `security` ou `documentation` ne sont jamais fermees.
          close-issue-message: |
            🗄️ Issue fermee automatiquement faute d'activite.

            **N'hesitez pas a la rouvrir** si le sujet est toujours pertinent !

          # Exempt labels : on ne ferme JAMAIS ces issues
          exempt-issue-labels: "pinned,security,help-wanted,good-first-issue,bug,documentation,high-priority"

          # ===== Pull Requests =====
          days-before-pr-stale: 30  # 1 mois -> stale
          days-before-pr-close: 7   # 1 semaine apres -> close
          stale-pr-label: "stale"
          stale-pr-message: |
            👋 Cette PR n'a pas eu d'activite depuis 30 jours.

            Elle sera fermee dans 7 jours. Pour la garder ouverte : commit/
            commentez ou retirez le label `stale`.
          close-pr-message: |
            🗄️ PR fermee automatiquement faute d'activite.

            **Si le travail reprend, vous pouvez la rouvrir** ou en creer une
            nouvelle.

          exempt-pr-labels: "pinned,security,wip,work-in-progress,blocked"

          # ===== General =====
          operations-per-run: 100  # max 100 issues/PRs traitees par run
          remove-stale-when-updated: true  # retire stale si commentaire
          delete-branch: true  # supprime la branche apres close PR
          ascending: true  # traite les plus anciennes d'abord
