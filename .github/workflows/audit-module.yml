name: Module Audit (Claude)

# Audit complet par couche/module avec Claude Code Action.
#
# Modes :
# 1. workflow_dispatch : choix manuel d'une couche dans dropdown
# 2. schedule cron : rotation automatique 1 couche/jour de semaine (lun-ven)
# 3. workflow_dispatch + target=all : audit complet d'un coup
#
# Chaque audit :
# - Liste les modules de la couche
# - Claude lit chaque module et fait l'analyse
# - Genere un rapport markdown daté dans docs/internal/audits/daily/
# - Ouvre une PR avec le rapport
# - Si fixes critiques trouves, ouvre des PRs separees
#
# Consomme du quota Claude Max via OAuth token.

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Couche a auditer"
        required: true
        type: choice
        options:
          - all
          - transverse
          - domain
          - domain-perceptual
          - app
          - infra
          - infra-db
          - infra-probe
          - ui-api
          - frontend
        default: domain
      level:
        description: "Niveau d'agressivite"
        required: false
        type: choice
        options:
          - defensif
          - modere
          - agressif
        default: modere
      open_prs:
        description: "Ouvrir des PRs avec les fixes (true/false)"
        required: false
        type: choice
        options:
          - "true"
          - "false"
        default: "true"

  schedule:
    # Mode "tout chaque jour" (v1.0.0-beta intensive review).
    # Audit complet (target=all) tous les jours a 04h00 UTC.
    # Claude verifie les issues/PRs existantes pour ne pas creer de doublons :
    # - Si une issue ouverte couvre deja le sujet -> commente dedans
    # - Si une PR ouverte fixe deja le point -> skip
    # - Sinon crée nouvelle issue/PR
    # A enlever apres 1 semaine en remettant le cron en rotation lun-ven.
    - cron: "0 4 * * *"

# Best practice OpenSSF Scorecard : top-level permissions = read-only.
# Les writes sont scopes au job audit ci-dessous qui en a besoin.
permissions:
  contents: read

# Eviter 2 runs d'audit en parallele : si un manuel est lance pendant
# le cron, le 2eme attend (ne pas annuler, sinon perte du travail en cours).
concurrency:
  group: audit-module-${{ github.event.inputs.target || 'auto' }}
  cancel-in-progress: false

jobs:
  audit:
    name: Audit ${{ github.event.inputs.target || 'auto-rotation' }}
    runs-on: ubuntu-latest
    # Permissions scopees au job audit : besoin de creer issues/PRs
    # et pousser sur branches non-protegees. main reste protegee.
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    # Timeout pousse au maximum GitHub-hosted runners (6h).
    # Audit profond multi-agent + auto-correction : on prend tout
    # le temps necessaire, ne sacrifie pas la qualite.
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Determine target (manual or auto-daily-all)
        id: target
        shell: bash
        run: |
          # Si declenche manuellement : prendre l'input.
          # Sinon (cron quotidien) : audit complet target=all.
          # (Mode v1.0.0-beta intensive ; basculera plus tard sur rotation par jour)
          target="${{ github.event.inputs.target }}"
          if [ -z "$target" ]; then
            day=$(date +%u)
            case "$day" in
              7) target="transverse" ;;
              *) target="all" ;;
            esac
            echo "Rotation auto jour=$day -> $target"
          fi
          echo "target=$target" >> "$GITHUB_OUTPUT"

      - name: Build module list
        id: modules
        shell: bash
        run: |
          target="${{ steps.target.outputs.target }}"
          case "$target" in
            all)
              modules=$(find cinesort -type f -name '*.py' ! -path '*__pycache__*' ! -path '*__init__.py' | sort)
              ;;
            transverse)
              modules="TRANSVERSE_ANALYSIS"
              ;;
            domain)
              modules=$(find cinesort/domain -maxdepth 1 -type f -name '*.py' ! -name '__init__.py' | sort)
              ;;
            domain-perceptual)
              modules=$(find cinesort/domain/perceptual -type f -name '*.py' ! -name '__init__.py' | sort)
              ;;
            app)
              modules=$(find cinesort/app -type f -name '*.py' ! -name '__init__.py' | sort)
              ;;
            infra)
              modules=$(find cinesort/infra -maxdepth 1 -type f -name '*.py' ! -name '__init__.py' | sort)
              ;;
            infra-db)
              modules=$(find cinesort/infra/db -maxdepth 1 -type f -name '*.py' ! -name '__init__.py' | sort)
              ;;
            infra-probe)
              modules=$(find cinesort/infra/probe -type f -name '*.py' ! -name '__init__.py' | sort)
              ;;
            ui-api)
              modules=$(find cinesort/ui/api -type f -name '*.py' ! -name '__init__.py' | sort)
              ;;
            frontend)
              modules=$(find web -type f \( -name '*.js' -o -name '*.html' \) ! -path '*backup*' ! -path '*preview*' | sort | head -50)
              ;;
            *)
              echo "Unknown target: $target"
              exit 1
              ;;
          esac
          {
            echo 'list<<EOF'
            echo "$modules"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          count=$(echo "$modules" | grep -c '.' || true)
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Modules a auditer ($count) :"
          echo "$modules" | head -20

      - name: Run Claude audit
        uses: anthropics/claude-code-action@dde2242db6af13460b916652159b6ba19a598f30 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Modele : Opus 4.7. Le modele est passe via --model dans
          # claude_args (NB : 'model' au niveau input direct n'existe
          # pas, ca a fait fail le run du 12/05 23h).
          # max-turns 1500 + timeout 360min : audit ultra-complet sans
          # plafond. La qualite est la priorite, pas le cout token.
          # --allowedTools en camelCase + format "Tool1,Tool2,Bash(cmd:*)"
          # (separe par virgule sans espace, entoure de double-quotes).
          claude_args: |
            --model claude-opus-4-7
            --max-turns 1500
            --allowedTools "Edit,Write,Read,Glob,Grep,WebFetch,Bash(gh issue create:*),Bash(gh issue comment:*),Bash(gh issue edit:*),Bash(gh issue list:*),Bash(gh issue view:*),Bash(gh pr create:*),Bash(gh pr comment:*),Bash(gh pr edit:*),Bash(gh pr list:*),Bash(gh pr view:*),Bash(gh label create:*),Bash(gh label list:*),Bash(gh search:*),Bash(git push:*),Bash(git checkout:*),Bash(git commit:*),Bash(git add:*),Bash(git branch:*),Bash(git tag:*),Bash(git merge:*),Bash(git rebase:*),Bash(git diff:*),Bash(git log:*),Bash(git status:*),Bash(find:*),Bash(grep:*),Bash(rg:*),Bash(wc:*),Bash(sort:*),Bash(uniq:*),Bash(head:*),Bash(tail:*),Bash(cat:*),Bash(python -m:*)"
          prompt: >-
            Audit automatique CineSort. Parametres de cette execution :
            - couche : "${{ steps.target.outputs.target }}"
            - niveau : "${{ github.event.inputs.level || 'modere' }}"
            - ouvrir PRs : "${{ github.event.inputs.open_prs || 'true' }}"


            ETAPE 1 OBLIGATOIRE AVANT TOUT : lis le fichier
            .github/audit-prompt.md du repo (deja checkout dans
            le workspace). Il contient TOUTES tes instructions detaillees :
            les 46 categories d'audit, les 6 personas multi-agent,
            les techniques cross-couche, le schema JSON output, les
            regles de dedup et de pre-commit, les outils 2026.


            ETAPE 2 : applique ces instructions sur les modules suivants
            (placeholder <MODULE_LIST> du fichier audit-prompt.md) :


            ${{ steps.target.outputs.target != 'transverse' && steps.modules.outputs.list || 'TRANSVERSE_ANALYSIS' }}


            ETAPE 3 : execute (gh issue create, gh pr create, git push).
            Ne te contente PAS de decrire les actions. EXECUTE-les.
            Reponds en francais dans tous les commentaires et issues.
