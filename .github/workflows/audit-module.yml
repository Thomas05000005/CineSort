name: Module Audit (Claude)

# Audit complet par couche/module avec Claude Code Action.
#
# Modes :
# 1. workflow_dispatch : choix manuel d'une couche dans dropdown
# 2. schedule cron : rotation automatique 1 couche/jour de semaine (lun-ven)
# 3. workflow_dispatch + target=all : audit complet d'un coup
#
# Chaque audit :
# - Liste les modules de la couche
# - Claude lit chaque module et fait l'analyse
# - Genere un rapport markdown daté dans docs/internal/audits/daily/
# - Ouvre une PR avec le rapport
# - Si fixes critiques trouves, ouvre des PRs separees
#
# Consomme du quota Claude Max via OAuth token.

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Couche a auditer"
        required: true
        type: choice
        options:
          - all
          - transverse
          - domain
          - domain-perceptual
          - app
          - infra
          - infra-db
          - infra-probe
          - ui-api
          - frontend
        default: domain
      level:
        description: "Niveau d'agressivite"
        required: false
        type: choice
        options:
          - defensif
          - modere
          - agressif
        default: modere
      open_prs:
        description: "Ouvrir des PRs avec les fixes (true/false)"
        required: false
        type: choice
        options:
          - "true"
          - "false"
        default: "true"

  schedule:
    # Mode "tout chaque jour" (v1.0.0-beta intensive review).
    # Audit complet (target=all) tous les jours a 04h00 UTC.
    # Claude verifie les issues/PRs existantes pour ne pas creer de doublons :
    # - Si une issue ouverte couvre deja le sujet -> commente dedans
    # - Si une PR ouverte fixe deja le point -> skip
    # - Sinon crée nouvelle issue/PR
    # A enlever apres 1 semaine en remettant le cron en rotation lun-ven.
    - cron: "0 4 * * *"

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  audit:
    name: Audit ${{ github.event.inputs.target || 'auto-rotation' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine target (manual or auto-daily-all)
        id: target
        shell: bash
        run: |
          # Si declenche manuellement : prendre l'input.
          # Sinon (cron quotidien) : audit complet target=all.
          # (Mode v1.0.0-beta intensive ; basculera plus tard sur rotation par jour)
          target="${{ github.event.inputs.target }}"
          if [ -z "$target" ]; then
            day=$(date +%u)
            case "$day" in
              7) target="transverse" ;;
              *) target="all" ;;
            esac
            echo "Rotation auto jour=$day -> $target"
          fi
          echo "target=$target" >> "$GITHUB_OUTPUT"

      - name: Build module list
        id: modules
        shell: bash
        run: |
          target="${{ steps.target.outputs.target }}"
          case "$target" in
            all)
              modules=$(find cinesort -type f -name '*.py' ! -path '*__pycache__*' ! -path '*__init__.py' | sort)
              ;;
            transverse)
              modules="TRANSVERSE_ANALYSIS"
              ;;
            domain)
              modules=$(find cinesort/domain -maxdepth 1 -type f -name '*.py' ! -name '__init__.py' | sort)
              ;;
            domain-perceptual)
              modules=$(find cinesort/domain/perceptual -type f -name '*.py' ! -name '__init__.py' | sort)
              ;;
            app)
              modules=$(find cinesort/app -type f -name '*.py' ! -name '__init__.py' | sort)
              ;;
            infra)
              modules=$(find cinesort/infra -maxdepth 1 -type f -name '*.py' ! -name '__init__.py' | sort)
              ;;
            infra-db)
              modules=$(find cinesort/infra/db -maxdepth 1 -type f -name '*.py' ! -name '__init__.py' | sort)
              ;;
            infra-probe)
              modules=$(find cinesort/infra/probe -type f -name '*.py' ! -name '__init__.py' | sort)
              ;;
            ui-api)
              modules=$(find cinesort/ui/api -type f -name '*.py' ! -name '__init__.py' | sort)
              ;;
            frontend)
              modules=$(find web -type f \( -name '*.js' -o -name '*.html' \) ! -path '*backup*' ! -path '*preview*' | sort | head -50)
              ;;
            *)
              echo "Unknown target: $target"
              exit 1
              ;;
          esac
          {
            echo 'list<<EOF'
            echo "$modules"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          count=$(echo "$modules" | grep -c '.' || true)
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Modules a auditer ($count) :"
          echo "$modules" | head -20

      - name: Run Claude audit
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Pre-autorisation gh + git pour creer issues/PRs/push sans
          # approbation interactive (non-dispo en CI).
          # Branch protection main reste active = pas de push direct dessus.
          claude_args: >-
            --allowed-tools "Bash(gh issue create:*) Bash(gh issue comment:*) Bash(gh issue edit:*) Bash(gh pr create:*) Bash(gh pr comment:*) Bash(gh pr edit:*) Bash(gh label create:*) Bash(git push:*) Bash(git checkout:*) Bash(git commit:*) Bash(git add:*) Bash(git branch:*) Bash(git tag:*) Bash(git merge:*) Bash(git rebase:*) Bash(find:*) Bash(grep:*) Bash(rg:*) Bash(wc:*) Bash(sort:*) Bash(uniq:*) Edit Write Read Glob Grep"
          prompt: >-
            Audit automatique de CineSort, couche "${{ steps.target.outputs.target }}",
            niveau "${{ github.event.inputs.level || 'modere' }}".

            Ouverture de PRs avec fixes : ${{ github.event.inputs.open_prs || 'true' }}.


            ${{ steps.target.outputs.target == 'transverse' && 'Analyse transverse : 1) liste les 49 fonctions de plus de 100 lignes par ROI de refactor (complexite vs gain). 2) liste les 22 composants JS dupliques desktop/dashboard et propose une strategie de mutualisation. 3) liste les 161 imports lazy et propose un decouplage cycle domain<->app. Reponds en francais.' || format('Modules a auditer ({0} fichiers) :', steps.modules.outputs.count) }}


            ${{ steps.target.outputs.target != 'transverse' && steps.modules.outputs.list || '' }}


            Mission :


            ============================
            ETAPE 0 - DEDUPLICATION
            ============================

            AVANT toute action, recense ce qui existe deja :

            - `gh issue list --state open --limit 200 --json number,title,body`
            - `gh pr list --state open --limit 100 --json number,title,headRefName,files`

            Stocke ces listes en memoire pour la suite.


            ============================
            ETAPE 1 - LECTURE
            ============================

            Pour CHAQUE module liste, lis le contenu integralement.


            ============================
            ETAPE 2 - ANALYSE
            ============================

            Cherche : bugs latents (None.method, comparaison douteuse,
            try/except trop large, race condition), simplifications mineures,
            patterns dangereux, fonctions trop longues (>100L), magic numbers,
            duplications, cycles imports, mauvais usage stdlib.


            ============================
            ETAPE 3 - RAPPORT JOURNALIER
            ============================

            Ecris (et ouvre une PR pour ajouter) :
            docs/internal/audits/claude/$(date +%Y-%m-%d)-${{ steps.target.outputs.target }}.md

            Format :
            - Resume executif (top 10 findings critiques)
            - Section par module avec liste des findings
              (severite low/med/high + ligne + description + suggestion)


            ============================
            ETAPE 4 - DEDUP DES FINDINGS
            ============================

            Pour chaque finding qui meriterait une issue ou PR :

            (a) Cherche dans la liste etape 0 si un titre similaire existe deja.
                Compare semantiquement, pas strict : "Bug audio_score returns 0
                for missing track" ~ "compute_audio_score retourne 0 pour None".

            (b) Si une ISSUE ouverte couvre deja ce sujet :
                - NE PAS creer de nouvelle issue
                - Ajoute un commentaire dans l'issue existante avec :
                  - La date du re-audit
                  - Le module + ligne ou tu retrouves le finding
                  - "Confirme toujours present" ou "Status mis a jour : ..."

            (c) Si une PR ouverte fixe deja ce point :
                - NE PAS refaire le meme fix
                - Saute ce finding (il est en cours de review)

            (d) Si rien d'existant :
                - Cree une issue avec titre "Conventional Commit" prefix
                  (ex: "fix(perceptual): ...", "refactor(app): ...")
                - Body : description + module + ligne + suggestion + label suggere


            ============================
            ETAPE 5 - PRS DE FIX
            ============================

            Si "${{ github.event.inputs.open_prs || 'true' }}" = "true"
            ET niveau != "defensif" :

            Pour les findings haut ROI / bas risque (apres dedup etape 4) :

            (a) Cherche dans les PRs ouvertes etape 0 si une PR sur le meme
                fichier traite deja ce point. Si oui, skip.

            (b) Sinon, ouvre une PR :
                - Branch : fix/audit-${{ steps.target.outputs.target }}-<topic>
                - Titre Conventional Commit
                - Body : explique le bug + le fix + reference l'issue creee etape 4

            LIMITE : 10 PRs maximum par run pour ne pas saturer la review.
            Si plus de 10 trouves, garde les top-10 prioritaires par severite,
            les autres restent en issue uniquement.


            ============================
            ETAPE 6 - DOCUMENTATION
            ============================

            En fin de run, poste un commentaire de synthese dans l'issue #14
            (Audit complet par modules) avec :
            - Date + couche auditee
            - Nb modules audites
            - Nb findings nouveaux / nb deja connus
            - Nb issues creees / nb PRs ouvertes
            - Lien vers le rapport markdown


            ============================
            REGLES TRANSVERSES
            ============================

            - REPONDS EN FRANCAIS dans tous les commentaires.
            - Niveau "modere" : fixes evidents/safe seulement.
            - Niveau "agressif" : refactors structurels (PRs distinctes).
            - Niveau "defensif" : rapport + issues uniquement, ZERO PR.
            - Conventional Commits obligatoire sur les titres PR (pr-title-lint
              le verifie sinon ca bloque).
            - Branch protection main : tu ne peux PAS push direct dessus, tu
              dois TOUJOURS passer par une branche + PR.

            ${{ steps.target.outputs.target == 'transverse' && 'Pour la couche transverse : 1) liste les 49 fonctions de plus de 100 lignes par ROI de refactor (complexite vs gain). 2) liste les 22 composants JS dupliques desktop/dashboard et propose une strategie de mutualisation. 3) liste les 161 imports lazy et propose un decouplage cycle domain<->app. Cree une issue pour chacune.' || '' }}
