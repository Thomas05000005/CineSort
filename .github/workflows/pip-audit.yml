name: pip-audit (CVE deps)

# Verifie l'absence de vulnerabilites connues (CVE) dans les
# dependances Python listees dans requirements*.txt.
#
# Localement on l'a lance manuellement en v7.8.0 (0 CVE).
# Ce workflow le rend permanent : a chaque push + chaque lundi
# pour rattraper les nouveaux CVE publies sur PyPI advisory DB.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Lundi 04h12 UTC : decalage horaire pour eviter peak hours
    - cron: "12 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: pip-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install "pip-audit>=2.7,<3"

      - name: Audit requirements.txt (production)
        run: pip-audit --requirement requirements.txt --strict

      - name: Audit requirements-build.txt (PyInstaller deps)
        run: pip-audit --requirement requirements-build.txt --strict

      - name: Audit requirements-dev.txt (dev + test deps)
        # Non bloquant : si une dep dev a un CVE qui n'affecte pas la
        # prod, on logue mais on ne bloque pas. Le strict mode reste
        # actif pour requirements.txt et requirements-build.txt.
        continue-on-error: true
        run: pip-audit --requirement requirements-dev.txt
