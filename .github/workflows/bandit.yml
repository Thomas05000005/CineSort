name: bandit (SAST Python)

# Bandit : static analysis pour bugs securite Python.
# Detecte try/except large, eval/exec, subprocess shell=True,
# hashlib MD5/SHA1, urllib sans timeout, etc.
#
# Mode "tolerant" pour la v1.0.0-beta : on log les findings sans bloquer
# le CI. Une fois la dette technique reduite, passer en mode strict
# avec --severity-level high pour bloquer les findings HIGH.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  bandit:
    name: bandit scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install bandit
        run: |
          python -m pip install --upgrade pip
          python -m pip install "bandit[sarif,toml]>=1.7,<2"

      - name: Run bandit
        # -ll : niveau severite LOW minimum
        # -ii : niveau confidence MEDIUM minimum (reduit faux positifs)
        # --skip B101 : "assert detected" (legitimate dans nos tests)
        # --skip B404,B603 : subprocess imports (utilise ffprobe/mediainfo
        #   avec args controles, pas user input)
        # --skip B311 : random pour usages non-cryptos (UI animations)
        # Output SARIF pour integration GitHub Security tab.
        # `|| true` : ne bloque pas le CI tant qu'on travaille la dette,
        # les findings restent visibles dans l'onglet Security.
        run: |
          bandit -r cinesort/ \
            --skip B101,B404,B603,B311 \
            -ll -ii \
            -f sarif -o bandit-results.sarif || true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit-results.sarif
          category: bandit
