name: Link Check (lychee)

# Verifie les liens markdown morts dans la doc.
# Critique pour un repo public avec beaucoup de doc FR (README, CHANGELOG,
# docs/, etc.) : un lien 404 vers une ressource externe degrade la confiance.

on:
  push:
    branches: [main]
    paths:
      - "**.md"
      - "**.html"
      - "docs/**"
      - "README*"
  pull_request:
    branches: [main]
    paths:
      - "**.md"
      - "**.html"
      - "docs/**"
      - "README*"
  schedule:
    # Mardi 07h UTC : recheck hebdomadaire (les liens externes peuvent
    # mourir entre 2 commits).
    - cron: "0 7 * * 2"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  link-check:
    name: lychee
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write  # lychee cree une issue auto si liens morts

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Restore lychee cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .lycheecache
          key: lychee-${{ github.sha }}
          restore-keys: lychee-

      - name: Run lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          # Args lychee :
          # --no-progress : pas de barre de progression dans les logs
          # --cache : cache pour eviter de retaper les memes URLs
          # --max-cache-age 7d : invalide cache apres 7 jours
          # --verbose : logs detailles pour debug
          # --accept 200,206,429 : 429 = rate limit, on ne plante pas dessus
          # --exclude 'github\.com/Thomas05000005/CineSort/issues/\d+' :
          #   pas verifier les liens vers issues internes (peuvent ne pas
          #   encore exister au moment du check)
          # Exclusions :
          # - github.com issues internes : peuvent ne pas exister au moment du check
          # - localhost / 127.0.0.1 / 192.168 / duckdns : adresses locales test
          # - ^/shared/ ^/views/ ^/locales/ ^/dashboard/ : paths root-relative servis
          #   par le REST server (cinesort/infra/rest_server.py) en runtime ; ils
          #   ne resolvent pas en fichiers statiques locaux mais existent en prod.
          # Path exclusions :
          # - web/ : contient des HTML avec paths root-relative `/shared/*` qui
          #   ne resolvent pas en local mais sont servis par REST runtime
          # - docs/internal/audits/, audit_v7_8_0/, operations/ : snapshots
          #   historiques avec liens vers du code qui a bouge depuis. Archives,
          #   pas a maintenir
          # - docs/internal/CLAUDE_HISTORY.md : archive sessions, contient des
          #   refs a anciens fichiers supprimes
          # - .release_notes_*.md : artefacts release temporaires (uploades sur
          #   GitHub Release puis supprimes)
          args: >-
            --no-progress
            --cache
            --max-cache-age 7d
            --verbose
            --accept 200,206,429
            --exclude 'github\.com/Thomas05000005/CineSort/issues/\d+'
            --exclude 'localhost'
            --exclude '127\.0\.0\.1'
            --exclude '192\.168\.'
            --exclude 'duckdns'
            --exclude-path 'web'
            --exclude-path 'docs/internal/audits'
            --exclude-path 'docs/internal/audit_v7_8_0'
            --exclude-path 'docs/internal/operations'
            --exclude-path 'docs/internal/CLAUDE_HISTORY.md'
            --
            './**/*.md'
            './**/*.html'
          fail: true
          # Non bloquant pour les paths external 503 transient
          jobSummary: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
