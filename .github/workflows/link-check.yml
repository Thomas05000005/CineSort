name: Link Check (lychee)

# Verifie les liens markdown morts dans la doc.
# Critique pour un repo public avec beaucoup de doc FR (README, CHANGELOG,
# docs/, etc.) : un lien 404 vers une ressource externe degrade la confiance.

on:
  push:
    branches: [main]
    paths:
      - "**.md"
      - "**.html"
      - "docs/**"
      - "README*"
  pull_request:
    branches: [main]
    paths:
      - "**.md"
      - "**.html"
      - "docs/**"
      - "README*"
  schedule:
    # Mardi 07h UTC : recheck hebdomadaire (les liens externes peuvent
    # mourir entre 2 commits).
    - cron: "0 7 * * 2"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  link-check:
    name: lychee
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write  # lychee cree une issue auto si liens morts

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Restore lychee cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .lycheecache
          key: lychee-${{ github.sha }}
          restore-keys: lychee-

      - name: Run lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          # Args lychee :
          # --no-progress : pas de barre de progression dans les logs
          # --cache : cache pour eviter de retaper les memes URLs
          # --max-cache-age 7d : invalide cache apres 7 jours
          # --verbose : logs detailles pour debug
          # --accept 200,206,429 : 429 = rate limit, on ne plante pas dessus
          # --exclude 'github\.com/Thomas05000005/CineSort/issues/\d+' :
          #   pas verifier les liens vers issues internes (peuvent ne pas
          #   encore exister au moment du check)
          # Strategie : lister EXPLICITEMENT les fichiers actifs a scanner,
          # plutot que de scanner tout puis exclure. Permet de garantir que
          # les archives historiques (docs/internal/audits/, audit_v7_8_0/,
          # operations/, CLAUDE_HISTORY.md) qui referencent du code disparu
          # depuis ne bloquent pas le CI.
          #
          # Web HTML (web/dashboard/index.html, etc.) utilise des paths
          # root-relative `/shared/*` servis par REST en runtime - non
          # resolvables en local statique mais valides en prod.
          args: >-
            --no-progress
            --cache
            --max-cache-age 7d
            --verbose
            --accept 200,206,401,403,429
            --exclude 'github\.com/Thomas05000005/CineSort/issues/\d+'
            --exclude 'localhost'
            --exclude '127\.0\.0\.1'
            --exclude '192\.168\.'
            --exclude 'duckdns'
            --exclude 'netflixtechblog\.com'
            --exclude 'professionalsupport\.dolby\.com'
            --
            './README.md'
            './CHANGELOG.md'
            './CONTRIBUTING.md'
            './CODE_OF_CONDUCT.md'
            './SECURITY.md'
            './LICENSE'
            './docs/MANUAL.md'
            './docs/TROUBLESHOOTING.md'
            './docs/RELEASE.md'
            './docs/internal/CLAUDE.md'
            './docs/internal/ROADMAP.md'
            './docs/internal/BILAN_CORRECTIONS.md'
            './docs/internal/REFACTOR_PLAN_83.md'
            './docs/internal/REFACTOR_PLAN_84.md'
          fail: true
          # Non bloquant pour les paths external 503 transient
          jobSummary: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
