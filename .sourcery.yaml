# Configuration Sourcery pour CineSort
# https://docs.sourcery.ai/Configuration/Project-Settings/

version: "1"

# Dossiers ignores par Sourcery
ignore:
  - .git
  - .venv
  - .venv313
  - venv
  - build
  - dist
  - packages
  - __pycache__
  - .tmp_test
  - .tmp_audit
  - .ui_backups
  - archive_ui_next_20260308
  - web_next_zero
  - docs/internal
  - tests/manual
  - tests/e2e
  - tests/e2e_dashboard
  - tests/e2e_desktop
  - runtime_hooks
  - scripts/_phase*.py

# Refactor rules : on prend les recommandations Sourcery par defaut
# mais on disable les regles qui sont deja gerees par Ruff ou qui ne
# sont pas pertinentes pour notre style.
rule_settings:
  enable:
    - default
    - readability  # readability suggestions (top priorite)
    - performance  # micro-optimisations Python
    - complexity   # detecte methodes complexes (similaire C901 Ruff)
  disable:
    # do-not-use-bare-except : deja Ruff BLE001
    - do-not-use-bare-except
    # use-fstring-for-concatenation : bruyant sur les chaines de log
    - use-fstring-for-concatenation
    # use-named-expression : walrus operator (:=) trop subtile pour notre style
    - use-named-expression
    # convert-to-comprehension : parfois rend illisible
    - convert-to-comprehension-for-conditional
    # raise-from : pas critique
    - raise-from-previous-error

# Integration GitHub : commentaires sur les PRs
github:
  # Active les reviews automatiques sur les PRs ouvertes
  on_pull_request_review_comments: true
  review_comments:
    enabled: true
    # Ne commenter QUE les suggestions a haute confiance
    # (sinon trop bruyant sur du legacy code)
    severity: high
  # Pas de message d'introduction a chaque PR (bruit inutile)
  ci_setup_message: false

# Metrics : remonter la complexite cyclomatique
metrics:
  function_length: 60  # warning au-dessus de 60 lignes
  function_complexity: 12  # cyclomatic complexity
